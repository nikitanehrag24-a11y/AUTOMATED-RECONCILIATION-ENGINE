version: '3.8'

services:
  test_db:
    image: postgres:15-alpine
    container_name: recon_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recon_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recon_test_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  test_runner:
    build: .
    container_name: recon_test_runner
    depends_on:
      test_db:
        condition: service_healthy
    environment:
      - ENVIRONMENT=testing
      - DATABASE_URL=postgresql://postgres:postgres@test_db:5432/recon_test_db
      - REDIS_URL=redis://localhost:6379/0  # Mocked or not used in test runs
    volumes:
      - .:/app
    command: pytest --cov=engine --cov=api -v
